site_name: DerivaML
site_url: https://informatics-isi-edu.github.io/deriva-ml
theme:
  name: material
  logo: assets/deriva-logo.png
  features:
    - navigation.instant
    - navigation.expand
    - navigation.footer
  palette:
    scheme: slate
    primary: black
    accent: blue
  copyright: "© Copyright 2025, USC Information Sciences Institute, Informatics Systems Research Division."

plugins:
  - search
  - autorefs
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src  # Search for modules in the 'src' directory
          options:
            docstring_style: google
            separate_signature: true
            show_signature_annotations: true
            line_length: 40
            annotations_path: brief
            inherited_members: true
            preload_modules: [ semver ]
            filters:
              - "!^_"
              - "^__"

  - mkdocs-jupyter:
      include: [ "*.ipynb" ]
      include_source: True

nav:
  - Home: index.md
  - User Guide:
      - Exploring a catalog: user-guide/exploring.md
  - Getting Started:
      - Quick Start: getting-started/quick-start.md
      - Installation: getting-started/install.md
      - Project Setup: getting-started/project-setup.md
  - Concepts:
      - Architecture Overview: concepts/overview.md
      - Identifiers: concepts/identifiers.md
      - Datasets: concepts/datasets.md
      - Features: concepts/features.md
      - File Assets: concepts/file-assets.md
      - Catalog Annotations: concepts/annotations.md
  - Configuration:
      - Overview: configuration/overview.md
      - Configuration Groups: configuration/groups.md
      - Experiments and Multiruns: configuration/experiments.md
      - Notebook Configuration: configuration/notebooks.md
  - Running Workflows:
      - Execution Lifecycle: workflows/execution-lifecycle.md
      - Running Models: workflows/running-models.md
      - Git Workflow and Versioning: workflows/git-and-versioning.md
  - CLI Reference: cli-reference.md
  - Sample Notebooks:
      - Datasets: 'Notebooks/DerivaML Dataset.ipynb'
      - Execution: 'Notebooks/DerivaML Execution.ipynb'
      - Features: 'Notebooks/DerivaML Features.ipynb'
      - Vocabulary: 'Notebooks/DerivaML Vocabulary.ipynb'
  - Library Documentation:
      - Core Classes:
          - DerivaML: code-docs/deriva_ml_base.md
          - DerivaModel: code-docs/deriva_model.md
      - Datasets:
          - Dataset: code-docs/dataset.md
          - DatasetBag: code-docs/dataset_bag.md
          - Dataset Splitting: code-docs/dataset_split.md
          - Dataset Auxiliary Classes: code-docs/dataset_aux_classes.md
      - Execution:
          - Execution: code-docs/execution.md
          - ExecutionConfiguration: code-docs/execution_configuration.md
          - Workflow: code-docs/workflow.md
      - Features:
          - Feature: code-docs/feature.md
      - Utilities:
          - Definitions & Types: code-docs/deriva_definitions.md
          - Exceptions: code-docs/exceptions.md
          - Upload: code-docs/upload.md
  - Release Notes: release-notes.md
